<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#fb5607">
  <meta name="description" content="A creative coding adventure where kids and adults solve mini challenges, unlock badges, and become Python wizards.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PyQuest">
  <title>PyQuest Carnival</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23fb5607' width='192' height='192'/><text x='96' y='120' font-size='80' font-weight='bold' fill='white' text-anchor='middle' font-family='Arial'>Py</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <div class="bg-grid"></div>

  <main class="app-shell">
    <section class="hero-card">
      <div class="hero-text">
        <p class="eyebrow">Play + Learn Python</p>
        <h1>PyQuest Carnival</h1>
        <p class="subtitle">A creative coding adventure where kids and adults solve mini challenges, unlock badges, and become Python wizards.</p>
      </div>
      <div class="hero-controls">
        <label class="control-label" for="playerMode">Choose your learning style</label>
        <select id="playerMode" aria-label="Choose player mode">
          <option value="kids">Kids Mode (story + simple hints)</option>
          <option value="adult">Adult Mode (technical hints)</option>
        </select>
        <button id="startBtn" class="btn btn-primary">Start Adventure</button>
      </div>
    </section>

    <section class="game-layout">
      <aside class="sidebar card pop-in">
        <h2>Mission Board</h2>
        <div class="stat-grid">
          <article class="stat-item">
            <h3>Level</h3>
            <p id="levelNumber">0 / 0</p>
          </article>
          <article class="stat-item">
            <h3>Score</h3>
            <p id="scoreValue">0</p>
          </article>
          <article class="stat-item">
            <h3>Streak</h3>
            <p id="streakValue">0</p>
          </article>
          <article class="stat-item">
            <h3>Badges</h3>
            <p id="badgeValue">0</p>
          </article>
        </div>

        <div class="progress-wrap" aria-label="Progress">
          <div id="progressBar" class="progress-bar"></div>
        </div>

        <div class="badge-list" id="badgeList"></div>
      </aside>

      <section class="challenge-area card pop-in">
        <header class="challenge-header">
          <h2 id="challengeTitle">Press Start to begin!</h2>
          <p id="challengeStory">Your coding carnival opens when you hit Start Adventure.</p>
        </header>

        <div id="challengeBody" class="challenge-body"></div>

        <div class="challenge-actions">
          <button id="hintBtn" class="btn btn-ghost">Hint</button>
          <button id="submitBtn" class="btn btn-primary">Submit</button>
          <button id="nextBtn" class="btn btn-secondary" disabled>Next</button>
        </div>

        <p id="feedback" class="feedback" role="status" aria-live="polite"></p>
      </section>
    </section>
  </main>

  <template id="mcqTemplate">
    <div class="question-block">
      <pre class="code-card" id="mcqCode"></pre>
      <div id="mcqOptions" class="options"></div>
    </div>
  </template>

  <template id="outputTemplate">
    <div class="question-block">
      <pre class="code-card" id="outputCode"></pre>
      <label for="outputAnswer" class="control-label">What will this print?</label>
      <input id="outputAnswer" type="text" autocomplete="off" placeholder="Type output here">
    </div>
  </template>

  <template id="fixTemplate">
    <div class="question-block">
      <pre class="code-card" id="fixCode"></pre>
      <label class="control-label">Choose the best fix:</label>
      <div id="fixOptions" class="options"></div>
    </div>
  </template>

  <template id="arrangeTemplate">
    <div class="question-block">
      <p class="arrange-help">Tap tokens to build a working Python line.</p>
      <div id="tokenPool" class="token-pool"></div>
      <div class="builder-row">
        <p class="builder-title">Your code:</p>
        <div id="tokenAnswer" class="token-answer"></div>
      </div>
      <div class="small-actions">
        <button id="undoToken" class="btn btn-ghost">Undo</button>
        <button id="clearToken" class="btn btn-ghost">Clear</button>
      </div>
    </div>
  </template>

  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js").then((reg) => {
        console.log("✓ Service Worker registered:", reg);
      }).catch((err) => {
        console.log("✗ Service Worker registration failed:", err);
      });
    }
  </script>
</body>
</html>
